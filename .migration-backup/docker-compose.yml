services:
  db:
    image: pgvector/pgvector:pg16
    container_name: syncops-db
    environment:
      POSTGRES_USER: syncops
      POSTGRES_PASSWORD: syncops
      POSTGRES_DB: syncops
    ports:
      - "5432:5432"
    volumes:
      - syncops_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syncops -d syncops"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: syncops-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://syncops:syncops@db:5432/syncops
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: syncops-frontend
    environment:
      BACKEND_URL: http://backend:8000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  syncops_pgdata:
