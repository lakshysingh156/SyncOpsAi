[project]
name = "syncops-ai-backend"
version = "0.1.0"
description = "SyncOps AI — AI-native observability platform backend (FastAPI)"

requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "pydantic>=2.9.0",
    "pydantic-settings>=2.6.0",
    "sqlalchemy[asyncio]>=2.0.36",
    "asyncpg>=0.30.0",
    "alembic>=1.14.0",
    "pgvector>=0.3.6",
    "python-dotenv>=1.0.1",
    "httpx>=0.27.2",
    "apscheduler>=3.10.4",
    "google-generativeai>=0.8.3",
    "greenlet>=3.1.1",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.7.0",
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "psycopg2-binary>=2.9.10",
]

[tool.ruff]
line-length = 100
target-version = "py311"
# Autogenerated Alembic migrations are not hand-edited for style.
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["B008"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]
